version: '3.8'

services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.9
    container_name: etcd
    environment:
      - ETCD_NAME=etcd0
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd:2379
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
      - ETCD_INITIAL_ADVERTISE_PEER_URLS=http://etcd:2380
      - ETCD_LISTEN_PEER_URLS=http://0.0.0.0:2380
      - ETCD_INITIAL_CLUSTER=etcd0=http://etcd:2380
      - ETCD_INITIAL_CLUSTER_STATE=new
      - ETCD_INITIAL_CLUSTER_TOKEN=etcd-cluster
    ports:
      - "2379:2379"
      - "2380:2380"
    networks:
      - energy-net

  flight-server:
    image: lab14_energy-collector:latest
    build:
      context: .
      dockerfile: Dockerfile.collector
    container_name: flight-server
    depends_on:
      - etcd
    environment:
      - FLIGHT_SERVER=true
    ports:
      - "8815:8815"
    networks:
      - energy-net
    restart: unless-stopped

  python-client:
    image: lab14_energy-python-client:latest
    build:
      context: ./python
      dockerfile: ../Dockerfile.python
    container_name: python-client
    depends_on:
      - flight-server
    environment:
      - FLIGHT_HOST=flight-server
      - FLIGHT_PORT=8815
    networks:
      - energy-net
    restart: unless-stopped

  collector1:
    image: lab14_energy-collector:latest
    container_name: collector1
    depends_on:
      - etcd
      - flight-server
      - kafka
    environment:
      - COLLECTOR_ID=collector-1
      - ETCD_ENDPOINTS=etcd:2379
      - TOTAL_METERS=1000
      - NUM_SHARDS=4
      - INTERVAL=5s
      - WINDOW_TIME=30s
      - WINDOW_COUNT=0
      - FLIGHT_ADDR=flight-server:8815
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_TOPIC=energy-aggregated
    networks:
      - energy-net
    restart: unless-stopped

  collector2:
    image: lab14_energy-collector:latest
    container_name: collector2
    depends_on:
      - etcd
      - flight-server
      - kafka
    environment:
      - COLLECTOR_ID=collector-2
      - ETCD_ENDPOINTS=etcd:2379
      - TOTAL_METERS=1000
      - NUM_SHARDS=4
      - INTERVAL=5s
      - WINDOW_TIME=30s
      - WINDOW_COUNT=0
      - FLIGHT_ADDR=flight-server:8815
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_TOPIC=energy-aggregated
    networks:
      - energy-net
    restart: unless-stopped

  collector3:
    image: lab14_energy-collector:latest
    container_name: collector3
    depends_on:
      - etcd
      - flight-server
      - kafka
    environment:
      - COLLECTOR_ID=collector-3
      - ETCD_ENDPOINTS=etcd:2379
      - TOTAL_METERS=1000
      - NUM_SHARDS=4
      - INTERVAL=5s
      - WINDOW_TIME=30s
      - WINDOW_COUNT=0
      - FLIGHT_ADDR=flight-server:8815
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_TOPIC=energy-aggregated
    networks:
      - energy-net
    restart: unless-stopped

  collector4:
    image: lab14_energy-collector:latest
    container_name: collector4
    depends_on:
      - etcd
      - flight-server
      - kafka
    environment:
      - COLLECTOR_ID=collector-4
      - ETCD_ENDPOINTS=etcd:2379
      - TOTAL_METERS=1000
      - NUM_SHARDS=4
      - INTERVAL=5s
      - WINDOW_TIME=30s
      - WINDOW_COUNT=0
      - FLIGHT_ADDR=flight-server:8815
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_TOPIC=energy-aggregated
    networks:
      - energy-net
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - energy-net

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - energy-net

  kafka-analyzer:
    image: lab14_energy-kafka-analyzer:latest
    build:
      context: .
      dockerfile: Dockerfile.kafka-analyzer
    container_name: kafka-analyzer
    depends_on:
      - kafka
    environment:
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_TOPIC=energy-aggregated
      - REPORT_INTERVAL=30
    networks:
      - energy-net
    restart: unless-stopped

  analyzer:
    image: lab14_energy-analyzer:latest
    build:
      context: .
      dockerfile: Dockerfile.analyzer
    container_name: analyzer
    depends_on:
      - etcd
    environment:
      - ETCD_ENDPOINTS=etcd:2379
      - INTERVAL=30s
      - WINDOW=5m
    networks:
      - energy-net
    restart: unless-stopped

  dashboard:
    image: lab14_energy-dashboard:latest
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: dashboard
    depends_on:
      - kafka
    ports:
      - "8501:8501"
    environment:
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_TOPIC=energy-aggregated
      - DASHBOARD_MAX_POINTS=500
    networks:
      - energy-net
    restart: unless-stopped

networks:
  energy-net:
    driver: bridge
